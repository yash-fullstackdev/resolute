# ── S1: Brahmaastra ────────────────────────────────────────────────────────────
# 9:15–10:15 AM first-hour strategy using 15m ORB + PDH/PDL trap formation.
# Buys ATM/ITM CE or PE after institutional footprint is confirmed.
# ──────────────────────────────────────────────────────────────────────────────
brahmaastra:
  enabled: true
  category: BUYING
  min_capital_tier: STARTER
  allowed_segments: [NSE_INDEX]
  instruments: [NIFTY, BANKNIFTY, SENSEX]
  # Gap filter — skip ORB when overnight gap is too small
  gap_threshold_pct: 0.4          # minimum gap % to activate ORB module
  # Opening Range definition
  orb_range_start: "09:15"        # IST — range starts
  orb_range_end:   "09:45"        # IST — range ends (2 × 15m candles)
  execution_window_end: "10:15"   # IST — last valid entry time
  kill_switch_time: "10:30"       # IST — hard cutoff, no new entries after this
  # Trap formation (PDH/PDL)
  wick_ratio_min: 1.5             # lower wick must be ≥ 1.5× candle body
  # Entry confirmation
  confirmation_timeframe: "15m"   # candle timeframe used for ORB confirmation
  require_body_close: true        # body must close above RH / below RL (no wicks)
  # Strike selection
  strike_selection: ATM           # ATM | 1_ITM (prefer ATM/ITM, avoid OTM)
  avoid_doji_low_vix: true        # skip ORB when first 15m is doji + VIX < 13
  max_india_vix: 30
  # Risk management
  stop_loss_pct: 50               # 50% premium loss = stop (or wick SL if smaller)
  partial_book_pct: 50            # book 50% of position at 1:1 RR
  partial_book_rr: 1.0            # trigger 1st partial at this RR
  final_target_rr: 1.5            # trail remainder for 1:1.5 RR
  sl_move_to_cost_at_rr: 1.0     # move SL to entry cost after partial book
  max_fires_per_day: 2            # max 1 ORB + 1 Trap per day

# ── S2: 5 EMA Mean Reversion ──────────────────────────────────────────────────
# Buys PE on 5m when price floats above 5 EMA (bearish exhaustion).
# Buys CE on 15m when price floats below 5 EMA (bullish exhaustion).
# Alert candle detected → entry on break of its high/low.
# ──────────────────────────────────────────────────────────────────────────────
ema5_mean_reversion:
  enabled: true
  category: BUYING
  min_capital_tier: STARTER
  allowed_segments: [NSE_INDEX]
  instruments: [NIFTY, BANKNIFTY]
  # Indicator
  ema_period: 5
  # Timeframe split — fear is fast, greed is slow
  pe_timeframe: "5m"             # bearish signal timeframe
  ce_timeframe: "15m"            # bullish signal timeframe
  # Validation window — alert candle must trigger within N candles
  trigger_candles_max: 3         # invalidate alert if price touches EMA first
  # Strike selection
  strike_selection: ATM          # ATM | 1_ITM
  # Risk management
  rr_min: 3.0                    # minimum risk-to-reward target (1:3)
  # SL = high (PE) or low (CE) of the alert candle
  # Circuit breaker
  daily_loss_limit: 3            # halt all entries after 3 stop-loss hits in a day
  # Filters
  min_india_vix: 12              # skip if VIX too low (no extension from EMA)
  max_india_vix: 35
  min_distance_ema_pct: 0.002    # alert candle must be ≥ 0.2% away from EMA
  max_fires_per_day: 6           # combined CE + PE

# ── S3: Parent-Child Multi-Timeframe Momentum ─────────────────────────────────
# 1H parent (EMA 10/30/100 + MACD 48/104/36) gates the trend.
# 5m child (same indicators) provides tactical entry signal candle.
# Buys 1–2 OTM CE or PE; profit target 25% premium; structural SL.
# ──────────────────────────────────────────────────────────────────────────────
parent_child_momentum:
  enabled: true
  category: BUYING
  min_capital_tier: STARTER
  allowed_segments: [NSE_INDEX, NSE_FO]
  instruments: [NIFTY, BANKNIFTY]   # Nifty 100 stocks also eligible via NSE_FO
  # Time window (avoid first-45m volatility and late Theta decay)
  execution_start: "10:00"           # IST
  execution_end:   "14:30"           # IST
  hard_exit_time:  "15:15"           # IST — close all positions
  # Timeframe hierarchy
  parent_timeframe: "1H"
  child_timeframe:  "5m"
  # EMA stack (same params on both timeframes)
  ema_short:  10
  ema_mid:    30
  ema_long:   100
  # Custom MACD (4× standard params)
  macd_fast:   48
  macd_slow:  104
  macd_signal: 36
  # Strike selection — slightly OTM for Gamma acceleration
  strike_selection: 1_OTM           # 1 or 2 strikes OTM
  strike_offset: 1                  # 1 = 1 OTM, 2 = 2 OTM
  # Risk management
  profit_target_pct: 25             # take profit at 25% premium appreciation
  underlying_target_pct: 0.75       # OR 0.75% move in underlying, whichever first
  sl_type: structural               # SL = recent swing high (PE) / swing low (CE)
  swing_lookback_bars: 5            # bars to look back for swing point on 5m chart
  # Trailing exits
  ema_crossback_exit: true          # exit if EMA10 crosses back over EMA30 on 5m
  macd_flip_exit: true              # exit if MACD histogram flips color on 5m
  # Filters
  min_india_vix: 11
  max_india_vix: 30
  max_fires_per_day: 4

